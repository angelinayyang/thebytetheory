{% extends "base.html" %}
{% block title %}Log in · Pixel Pantry{% endblock %}
{% block content %}
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

<div class="auth">
  <p class="eyebrow">Welcome back</p>
  <h1>Log in</h1>
  <form method="post" class="auth-form">
    <label class="field"><span>Username</span>
      <input type="text" name="username" autocomplete="username" required autofocus></label>
    <label class="field"><span>Password</span>
      <input type="password" name="password" autocomplete="current-password" required></label>
    <button type="submit" class="apply">Log in</button>
  </form>
  <p class="auth-alt">New here? <a href="{{ url_for('signup') }}">Create an account</a></p>
</div>
{% endblock %}
