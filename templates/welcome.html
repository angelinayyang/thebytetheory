{% extends "base.html" %}
{% block title %}Welcome · Pixel Pantry{% endblock %}
{% block content %}
<div class="auth welcome">
  <p class="eyebrow">One quick thing</p>
  <h1><i>When do you usually eat? </i></h1>
  <p class="welcome-sub"><i>We'll use these to remind you when it's time to start
     cooking. You can change them any time in Settings.</i></p>
  <form method="post" class="auth-form" action="{{ url_for('welcome') }}">
    <label class="field"><span>Breakfast</span>
      <input type="time" name="breakfast_time" value="{{ u['breakfast_time'] or '08:00' }}"></label>
    <label class="field"><span>Lunch</span>
      <input type="time" name="lunch_time" value="{{ u['lunch_time'] or '12:30' }}"></label>
    <label class="field"><span>Dinner</span>
      <input type="time" name="dinner_time" value="{{ u['dinner_time'] or '18:30' }}"></label>
    <label class="field"><span>Remind me before a meal</span>
      <select name="reminder_minutes">
        {% for o in options %}
          <option value="{{ o }}" {{ 'selected' if u['reminder_minutes'] == o }}>
            {{ 'No reminders' if o == 0 else o ~ ' minutes before' }}</option>
        {% endfor %}
      </select>
    </label>
    <button type="submit" class="apply">Save and continue</button>
  </form>
  <p class="auth-alt"><a href="{{ url_for('planner') }}">Skip for now</a></p>
</div>
{% endblock %}
